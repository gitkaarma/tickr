# Render Blueprint: provisions the Spring Boot API (Docker).
# The database is Neon (external); caching is in-memory on the instance.
# Create via Render -> New -> Blueprint -> connect this repo. Render prompts for every
# `sync: false` secret (API keys, DB credentials, CORS origin).
services:
  - type: web
    name: tickr-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
