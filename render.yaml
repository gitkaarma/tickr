# Render Blueprint: provisions the Spring Boot API (Docker) + a Redis cache together.
# The database is Neon (external) — its connection details are set as env vars below.
# Create via Render → New → Blueprint → connect this repo. Render prompts for every
# `sync: false` secret (API keys, DB creds, CORS origin).
services:
  - type: web
    name: tickr-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        fromService:
          name: tickr-redis
          type: redis
          property: connectionString

  - type: redis
    name: tickr-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
