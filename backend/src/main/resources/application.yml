spring:
  application:
    name: tickr-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: Tickr
    description: Global Equity & ETF Tracker

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Application-specific configuration (bound via @ConfigurationProperties later)
tickr:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  http:
    connect-timeout-ms: 4000
    read-timeout-ms: 8000
  providers:
    twelvedata:
      base-url: ${TWELVEDATA_BASE_URL:https://api.twelvedata.com}
      api-key: ${TWELVE_DATA_API_KEY:demo}
    finnhub:
      base-url: ${FINNHUB_BASE_URL:https://finnhub.io/api/v1}
      api-key: ${FINNHUB_API_KEY:}

# Light resilience: retry only transient upstream failures (not 404s or rate limits).
resilience4j:
  retry:
    instances:
      upstream:
        max-attempts: 3
        wait-duration: 400ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.tickr.provider.UpstreamException
