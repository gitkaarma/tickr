# Production profile: managed Postgres (Neon) + Redis (Upstash).
# Activated with SPRING_PROFILES_ACTIVE=prod. All connection details come from env vars.
spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      url: ${REDIS_URL}
      timeout: 3000ms
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
  cache:
    type: redis
