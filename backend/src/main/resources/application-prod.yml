# Production profile: managed Postgres (Neon) + an in-memory cache.
# Activated with SPRING_PROFILES_ACTIVE=prod. Connection details come from env vars.
#
# A single free instance uses an in-memory cache (same effect: collapses bursts into few
# upstream calls). The Redis-backed cache config remains in the codebase for multi-instance
# deployments — set spring.cache.type=redis and spring.data.redis.url to switch to it.
spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  cache:
    type: simple

management:
  health:
    redis:
      enabled: false
